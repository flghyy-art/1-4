<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok Video Splitter</title>
    <style>
        :root { 
            --bg-deep: #000000;          /* 纯黑背景 */
            --card-dark: #1A1A1A;       /* 卡片深灰 */
            --primary-purple: #B566FF; /* 亮紫色（按钮） */
            --ios-blue: #007AFF;         /* Grok 文本框边框蓝 */
            --text-main: #FFFFFF;        /* 白色主文本 */
            --text-muted: #8E8E93;       /* 灰色辅助文本 */
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg-deep); margin: 0; padding: 20px; display: flex; justify-content: center; color: var(--text-main); }
        .app-container { width: 100%; max-width: 440px; }
        
        /* 顶部标题 - 居中，AI 感 */
        .header { text-align: center; margin-bottom: 24px; margin-top: 10px; }
        .header h1 { font-size: 26px; margin: 0; font-weight: 700; background: linear-gradient(90deg, #FFFFFF, var(--primary-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { font-size: 14px; color: var(--text-muted); margin: 5px 0 0; }

        /* 主卡片 - 深色卡片 */
        .card { background: var(--card-dark); border-radius: 20px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* 上传区域 - Grok 输入框蓝边框风格 */
        .upload-zone { border: 2px solid var(--ios-blue); border-radius: 14px; padding: 30px 15px; text-align: center; cursor: pointer; display: block; transition: 0.3s; position: relative; overflow: hidden; }
        .upload-zone:active { background: rgba(0,122,255,0.05); }
        .upload-icon { font-size: 32px; display: block; margin-bottom: 10px; opacity: 0.8; }
        #fileLabel { font-size: 15px; color: var(--text-muted); font-weight: 500; }
        
        /* 核心大按钮 - Grok 亮紫色 */
        .main-action-btn { 
            width: 100%; padding: 18px; border: none; border-radius: 50px; /* 超圆角 */
            font-size: 17px; font-weight: 700; cursor: pointer; 
            transition: all 0.3s; 
            margin-top: 20px; display: none; /* 初始隐藏 */
            background: var(--primary-purple); color: #FFF;
            box-shadow: 0 5px 20px rgba(181,102,255,0.3);
        }
        .main-action-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* 状态文本 */
        #status { font-size: 14px; text-align: center; color: var(--primary-purple); margin-top: 15px; min-height: 20px; }

        /* 结果展示 */
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .video-item { background: #000; border-radius: 12px; overflow: hidden; position: relative; aspect-ratio: 1/1; border: 1px solid rgba(255,255,255,0.1); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .tag { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.6); color: #FFF; font-size: 10px; padding: 2px 6px; border-radius: 4px; backdrop-filter: blur(4px); }

        #sourceVideo { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Grok Imagine Video</h1>
        <p>四宫格智能拆分器</p>
    </div>

    <div class="card">
        <label class="upload-zone" id="dropZone">
            <span class="upload-icon">📂</span>
            <span id="fileLabel">点击上传 MP4 视频...</span>
            <input type="file" id="fileInput" accept="video/*" hidden>
        </label>
        
        <div id="status"></div>
        
        <button id="processBtn" class="main-action-btn" style="display:none;">开始全自动拆分</button>
        <button id="saveAllBtn" class="main-action-btn" style="display:none; background:var(--primary-purple);">📋 一键保存全部到相册</button>
    </div>

    <div class="result-grid" id="resultGrid"></div>
    <video id="sourceVideo" playsinline muted></video>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const sourceVideo = document.getElementById('sourceVideo');
    const processBtn = document.getElementById('processBtn');
    const saveAllBtn = document.getElementById('saveAllBtn');
    const resultGrid = document.getElementById('resultGrid');
    const status = document.getElementById('status');
    const fileLabel = document.getElementById('fileLabel');

    let videoData = [];

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            sourceVideo.src = URL.createObjectURL(file);
            fileLabel.innerText = "已加载预览：" + file.name.substring(0, 15) + "...";
            fileLabel.style.color = "var(--text-main)";
            processBtn.style.display = "block"; 
            saveAllBtn.style.display = "none";
            status.innerText = "准备就绪";
        }
    };

    processBtn.onclick = async () => {
        processBtn.disabled = true;
        processBtn.innerText = "智能分析与处理中...";
        resultGrid.innerHTML = '';
        videoData = [];
        
        const zones = [
            { n: 'Top-Left', col: 0, row: 0 }, { n: 'Top-Right', col: 1, row: 0 },
            { n: 'Bottom-Left', col: 0, row: 1 }, { n: 'Bottom-Right', col: 1, row: 1 }
        ];

        for (let zone of zones) {
            status.innerText = `正在处理: ${zone.n}...`;
            const blob = await captureZone(zone.col, zone.row);
            const url = URL.createObjectURL(blob);
            videoData.push({ name: zone.n, url: url });
            addPreview(zone.n, url);
        }

        status.innerText = "✨ 拆分完成，请长按播放保存";
        processBtn.style.display = "none";
        saveAllBtn.style.display = "block";
    };

    function captureZone(col, row) {
        return new Promise(resolve => {
            const w = sourceVideo.videoWidth / 2;
            const h = sourceVideo.videoHeight / 2;
            const canvas = Object.assign(document.createElement('canvas'), { width: w, height: h });
            const ctx = canvas.getContext('2d');
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/mp4' });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => resolve(new Blob(chunks, { type: 'video/mp4' }));
            sourceVideo.currentTime = 0;
            sourceVideo.play();
            recorder.start();
            const draw = () => {
                if (sourceVideo.paused || sourceVideo.ended) return recorder.stop();
                ctx.drawImage(sourceVideo, col * w, row * h, w, h, 0, 0, w, h);
                requestAnimationFrame(draw);
            };
            draw();
        });
    }

    function addPreview(name, url) {
        const div = document.createElement('div');
        div.className = 'video-item';
        div.innerHTML = `<span class="tag">${name}</span><video src="${url}" playsinline loop muted autoplay></video>`;
        resultGrid.appendChild(div);
    }

    saveAllBtn.onclick = () => {
        if(videoData.length === 0) return;
        videoData.forEach((file, i) => {
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = file.url;
                a.download = `Split_${file.name}.mp4`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }, i * 1500); // 增加间隔，防iOS拦截，Safari需要更长间隔
        });
        status.innerText = "请长按左下角蓝色箭头下载或单独保存";
    };
</script>
</body>
</html>
