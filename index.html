<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四宫格拆分预览</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .upload-area { border: 2px dashed #007AFF; border-radius: 15px; padding: 20px; margin: 15px 0; color: #007AFF; font-size: 14px; cursor: pointer; }
        .btn { background: #007AFF; color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 10px; }
        .btn-all { background: #34C759; display: none; }
        .grid-sim { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card-sim { background: #eee; height: 100px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #666; flex-direction: column; }
        .save-label { color: #007AFF; font-size: 10px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h3>🎬 视频四宫格拆分</h3>
        <p style="font-size: 12px; color: #8e8e93;">预览模式：模拟上传后的界面</p>
        
        <div class="upload-area">✅ 视频已加载: sample_video.mp4</div>
        
        <button class="btn" onclick="startSim()">开始一键拆分</button>
        <button id="allBtn" class="btn btn-all">保存全部到相册</button>

        <div id="status" style="font-size: 13px; color: #007AFF; margin: 10px 0;">等待开始...</div>

        <div class="grid-sim" id="grid">
            </div>
    </div>

    <script>
        function startSim() {
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            const allBtn = document.getElementById('allBtn');
            const zones = ['左上', '右上', '左下', '右下'];
            let i = 0;

            grid.innerHTML = '';
            const timer = setInterval(() => {
                if(i < zones.length) {
                    status.innerText = `正在处理: ${zones[i]}...`;
                    grid.innerHTML += `<div class="card-sim">🎥 ${zones[i]}画面<span class="save-label">保存成功</span></div>`;
                    i++;
                } else {
                    clearInterval(timer);
                    status.innerText = "✅ 全部处理完成！";
                    allBtn.style.display = 'block';
                }
            }, 800);
        }
    </script>
</body>
</html>
